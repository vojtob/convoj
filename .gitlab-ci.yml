# GitLab CI – Auto-DevOps + secret detection
# Vzor zo SIA_*. Pre projekt s Antora dokumentáciou stačí tento minimálny pipeline;
# build dokumentácie zatiaľ púšťame lokálne (scripts/build_*.sh).
# Ak chceš v CI publikovať Antora site, doplň job typu:
#
# pages:
#   stage: deploy
#   image: antora/antora
#   script:
#     - antora antora-playbook-concept.yml
#   artifacts:
#     paths:
#       - build/site
#   rules:
#     - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - build
  - test
  - deploy
  - review
  - dast
  - staging
  - canary
  - production
  - incremental rollout 10%
  - incremental rollout 25%
  - incremental rollout 50%
  - incremental rollout 100%
  - performance
  - cleanup
  - secret-detection

variables:
  SECRET_DETECTION_ENABLED: 'true'

secret_detection:
  stage: secret-detection

include:
  - template: Auto-DevOps.gitlab-ci.yml
